<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900" role="img" aria-labelledby="title desc">
  <title id="title">Module 7 Replatform Architecture - Azure Container Apps</title>
  <desc id="desc">Architecture diagram for Spring PetClinic replatformed to Azure Container Apps with managed ingress, container app revision, ACR, managed identity, secrets, Log Analytics, Terraform deployment and H2 validation database.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 z" fill="#2563eb"/>
    </marker>
    <marker id="arrowGreen" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 z" fill="#047857"/>
    </marker>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="7" stdDeviation="6" flood-color="#0f172a" flood-opacity="0.14"/>
    </filter>
    <style>
      .bg { fill: #f8fafc; }
      .title { font: 700 34px Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 400 16px Arial, sans-serif; fill: #475569; }
      .section-title { font: 700 17px Arial, sans-serif; fill: #1e3a8a; }
      .label { font: 700 17px Arial, sans-serif; fill: #0f172a; }
      .small { font: 400 14px Arial, sans-serif; fill: #334155; }
      .tiny { font: 400 12px Arial, sans-serif; fill: #475569; }
      .mono { font: 400 13px Consolas, monospace; fill: #1f2937; }
      .azure-boundary { fill: #eff6ff; stroke: #60a5fa; stroke-width: 2; stroke-dasharray: 10 8; }
      .rg-boundary { fill: #ffffff; stroke: #93c5fd; stroke-width: 2; }
      .env-boundary { fill: #f0fdfa; stroke: #2dd4bf; stroke-width: 2; }
      .card { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.5; rx: 18; filter: url(#shadow); }
      .card-blue { fill: #dbeafe; stroke: #60a5fa; stroke-width: 1.5; rx: 18; filter: url(#shadow); }
      .card-green { fill: #dcfce7; stroke: #22c55e; stroke-width: 1.5; rx: 18; filter: url(#shadow); }
      .card-purple { fill: #ede9fe; stroke: #8b5cf6; stroke-width: 1.5; rx: 18; filter: url(#shadow); }
      .card-amber { fill: #fef3c7; stroke: #f59e0b; stroke-width: 1.5; rx: 18; filter: url(#shadow); }
      .card-slate { fill: #f1f5f9; stroke: #94a3b8; stroke-width: 1.5; rx: 18; filter: url(#shadow); }
      .line { fill: none; stroke: #2563eb; stroke-width: 3; marker-end: url(#arrow); }
      .line-green { fill: none; stroke: #047857; stroke-width: 3; marker-end: url(#arrowGreen); }
      .line-dashed { fill: none; stroke: #2563eb; stroke-width: 3; stroke-dasharray: 9 8; marker-end: url(#arrow); }
      .pill { fill: #e0f2fe; stroke: #38bdf8; stroke-width: 1; rx: 12; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1400" height="900"/>
  <text class="title" x="60" y="58">Module 7 - Replatform to Azure Container Apps</text>
  <text class="subtitle" x="60" y="88">Spring PetClinic managed container target with external ingress, managed identity, ACR image pull, secrets, revision traffic, scaling and monitoring.</text>

  <rect class="azure-boundary" x="430" y="125" width="910" height="690" rx="26"/>
  <text class="section-title" x="455" y="158">Azure subscription</text>

  <rect class="rg-boundary" x="455" y="180" width="860" height="600" rx="24"/>
  <text class="section-title" x="480" y="212">Resource group: rg-petclinic-containerapps-dev</text>

  <rect class="env-boundary" x="500" y="250" width="430" height="270" rx="24"/>
  <text class="section-title" x="525" y="282">Container Apps Environment: petclinic-ca-env</text>

  <rect class="card-blue" x="535" y="315" width="175" height="92"/>
  <text class="label" x="558" y="346">Managed Ingress</text>
  <text class="small" x="558" y="371">External HTTPS</text>
  <text class="mono" x="558" y="393">443 -> 8081</text>

  <rect class="card-green" x="735" y="310" width="165" height="110"/>
  <text class="label" x="760" y="340">Container App</text>
  <text class="small" x="760" y="365">Latest revision</text>
  <text class="mono" x="760" y="387">x9s2a7b</text>
  <text class="tiny" x="760" y="407">min 1 / max 2 replicas</text>

  <rect class="card" x="980" y="240" width="255" height="108"/>
  <text class="label" x="1005" y="272">Azure Container Registry</text>
  <text class="mono" x="1005" y="296">petclinicacrc6mhqfua</text>
  <text class="mono" x="1005" y="318">spring-petclinic:300c8f7</text>

  <rect class="card-purple" x="980" y="385" width="255" height="112"/>
  <text class="label" x="1005" y="418">Managed Identity</text>
  <text class="small" x="1005" y="443">petclinic-ca-mi</text>
  <text class="mono" x="1005" y="467">Role: AcrPull</text>

  <rect class="card-slate" x="535" y="575" width="215" height="100"/>
  <text class="label" x="560" y="608">Log Analytics</text>
  <text class="small" x="560" y="633">Container logs</text>
  <text class="small" x="560" y="655">Platform telemetry</text>

  <rect class="card-amber" x="790" y="575" width="215" height="100"/>
  <text class="label" x="815" y="608">Container App Secrets</text>
  <text class="small" x="815" y="633">Feature flags</text>
  <text class="small" x="815" y="655">Future DB/TLS/API config</text>

  <rect class="card" x="1045" y="575" width="200" height="100"/>
  <text class="label" x="1070" y="608">Embedded H2</text>
  <text class="small" x="1070" y="633">Temporary runtime</text>
  <text class="small" x="1070" y="655">Module 7 validation</text>

  <rect class="card" x="70" y="280" width="230" height="102"/>
  <text class="label" x="100" y="315">User Browser</text>
  <text class="small" x="100" y="342">Public PetClinic endpoint</text>
  <text class="mono" x="100" y="364">HTTPS</text>

  <rect class="card-slate" x="70" y="535" width="230" height="120"/>
  <text class="label" x="100" y="568">Pipeline / Operator</text>
  <text class="small" x="100" y="594">Runs Terraform</text>
  <text class="small" x="100" y="617">Deploys managed target</text>

  <rect class="card" x="320" y="535" width="245" height="120"/>
  <text class="label" x="350" y="568">Terraform Manifest</text>
  <text class="mono" x="350" y="594">infra/terraform/</text>
  <text class="mono" x="350" y="616">container-apps</text>

  <rect class="pill" x="560" y="445" width="320" height="44"/>
  <text class="mono" x="585" y="473">SERVER_PORT=8081, profile=default</text>

  <path class="line" d="M300 331 C390 331 455 352 535 360"/>
  <text class="tiny" x="335" y="315">HTTPS 443</text>

  <path class="line" d="M710 361 L735 361"/>
  <text class="tiny" x="710" y="345">route</text>

  <path class="line-green" d="M900 354 C945 330 950 300 980 295"/>
  <text class="tiny" x="905" y="326">image pull</text>

  <path class="line-green" d="M1068 385 C1060 360 1040 348 1018 348"/>
  <text class="tiny" x="1085" y="370">AcrPull</text>

  <path class="line" d="M817 420 C810 500 700 520 645 575"/>
  <text class="tiny" x="690" y="535">logs</text>

  <path class="line" d="M850 420 C870 505 888 520 898 575"/>
  <text class="tiny" x="878" y="535">secret refs</text>

  <path class="line" d="M900 405 C980 455 1115 490 1145 575"/>
  <text class="tiny" x="1075" y="535">local DB</text>

  <path class="line-dashed" d="M300 594 L320 594"/>
  <path class="line-dashed" d="M565 594 C635 590 670 530 705 420"/>
  <text class="tiny" x="600" y="570">provision app, ingress, identity and scaling</text>

  <text class="section-title" x="70" y="730">Endpoint</text>
  <text class="mono" x="70" y="758">https://petclinic-container-app.victorioussand-ef83e08c.centralus.azurecontainerapps.io</text>
  <text class="section-title" x="70" y="805">Validation</text>
  <text class="small" x="70" y="833">Health check: /actuator/health returned HTTP 200 with status UP. Revision traffic: 100% to latest healthy revision.</text>
</svg>
