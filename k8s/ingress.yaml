apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: spring-petclinic
  namespace: petclinic
  labels:
    app.kubernetes.io/name: spring-petclinic
    app.kubernetes.io/part-of: azure-migration-assessment
  annotations:
    appgw.ingress.kubernetes.io/backend-protocol: "http"
    appgw.ingress.kubernetes.io/backend-path-prefix: "/"
    appgw.ingress.kubernetes.io/health-probe-path: "/actuator/health"
    appgw.ingress.kubernetes.io/request-timeout: "60"
    appgw.ingress.kubernetes.io/ssl-redirect: "true"
    appgw.ingress.kubernetes.io/waf-policy-for-path: "/subscriptions/<subscription-id>/resourceGroups/<network-rg>/providers/Microsoft.Network/applicationGatewayWebApplicationFirewallPolicies/petclinic-waf"
spec:
  ingressClassName: azure-application-gateway
  tls:
    - hosts:
        - petclinic.example.com
      secretName: petclinic-tls
  rules:
    - host: petclinic.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: petclinic
                port:
                  number: 80
