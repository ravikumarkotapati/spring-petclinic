# Azure runtime profile for the migration assessment.
#
# Non-secret values are supplied by Azure App Configuration and projected into
# the Container App as environment variables. Secret values remain in Key Vault
# or Container Apps secrets and are referenced by the existing postgres profile.
petclinic.runtime.config-source=${PETCLINIC_CONFIG_SOURCE:azure-app-configuration}
petclinic.runtime.externalized-config=${PETCLINIC_EXTERNALIZED_CONFIG:true}
petclinic.runtime.experimental-ui=${PETCLINIC_FEATURE_EXPERIMENTAL_UI:false}

management.endpoints.web.exposure.include=${MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE:health,info}
spring.datasource.hikari.data-source-properties.sslmode=${SPRING_DATASOURCE_HIKARI_DATA_SOURCE_PROPERTIES_SSLMODE:require}
